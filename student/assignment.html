<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradex | Tarea</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/student.css">
</head>
<body>
  <header>
    <h1>Gradex</h1>
    <div class="header-right">
      <span id="user-name"></span>
      <button id="btn-logout">Cerrar sesión</button>
    </div>
  </header>

  <main>
    <a class="back" href="javascript:history.back()">← Volver</a>

    <div class="assignment-detail">
      <h2 id="assignment-title"></h2>
      <p id="assignment-desc"></p>
      <p class="due">Entrega: <strong id="assignment-due"></strong></p>
    </div>

    <div class="submit-section">
      <h3>Mi entrega</h3>

      <!-- Si ya entregó -->
      <div id="already-submitted" class="hidden">
        <div class="submitted-box">
          <p>✅ Ya entregaste esta tarea</p>
          <a id="submitted-file" href="#" target="_blank" class="file-link hidden">Ver archivo entregado</a>
          <div id="grade-box" class="grade-box hidden">
            <p>Nota: <strong id="grade-value"></strong>/10</p>
            <p id="grade-feedback"></p>
          </div>
        </div>
      </div>

      <!-- Si no ha entregado -->
      <div id="submit-form">
        <input type="file" id="submit-file">
        <p class="hint">Adjunta un archivo (opcional)</p>
        <button id="btn-submit">Entregar tarea</button>
        <p id="submit-error" class="error"></p>
      </div>
    </div>
  </main>

  <script type="module">
    import { getProfile, logout } from '../js/auth.js'
    import { getAssignment, getSubmission, submitAssignment } from '../js/student/assignment.js'

    const params = new URLSearchParams(window.location.search)
    const assignmentId = params.get('id')
    if (!assignmentId) window.location.href = 'dashboard.html'

    const profile = await getProfile()
    if (!profile || profile.role !== 'student') window.location.href = '../index.html'

    document.getElementById('user-name').textContent = profile.full_name
    document.getElementById('btn-logout').addEventListener('click', logout)

    // Cargar tarea
    const assignment = await getAssignment(assignmentId)
    document.getElementById('assignment-title').textContent = assignment.title
    document.getElementById('assignment-desc').textContent = assignment.description || 'Sin descripción'
    document.getElementById('assignment-due').textContent = assignment.due_date
      ? new Date(assignment.due_date).toLocaleString()
      : 'Sin fecha'

    // Verificar si ya entregó
    const submission = await getSubmission(assignmentId, profile.id)
    if (submission) {
      document.getElementById('already-submitted').classList.remove('hidden')
      document.getElementById('submit-form').classList.add('hidden')

      if (submission.file_url) {
        const fileLink = document.getElementById('submitted-file')
        fileLink.href = submission.file_url
        fileLink.classList.remove('hidden')
      }

      if (submission.grade !== null) {
        document.getElementById('grade-box').classList.remove('hidden')
        document.getElementById('grade-value').textContent = submission.grade
        document.getElementById('grade-feedback').textContent = submission.feedback || ''
      }
    }

    // Entregar tarea
    document.getElementById('btn-submit').addEventListener('click', async () => {
      const file = document.getElementById('submit-file').files[0]
      const { error } = await submitAssignment(assignmentId, profile.id, file)
      if (error) return document.getElementById('submit-error').textContent = error.message
      window.location.reload()
    })
  </script>
</body>
</html>
