<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradex | Tarea</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/teacher.css">
</head>
<body>
  <header>
    <h1>Gradex</h1>
    <div class="header-right">
      <span id="user-name"></span>
      <button id="btn-logout">Cerrar sesión</button>
    </div>
  </header>

  <main>
    <a class="back" href="javascript:history.back()">← Volver</a>

    <div class="assignment-detail">
      <h2 id="assignment-title"></h2>
      <p id="assignment-desc"></p>
      <p class="due">Entrega: <strong id="assignment-due"></strong></p>
    </div>

    <h3 class="submissions-title">Entregas</h3>
    <div id="submissions-list" class="submissions-list"></div>

    <!-- Modal calificar -->
    <div id="modal-grade" class="modal hidden">
      <div class="modal-box">
        <h3>Calificar entrega</h3>
        <input type="number" id="grade-value" placeholder="Nota (0-10)" min="0" max="10" step="0.1">
        <textarea id="grade-feedback" placeholder="Feedback (opcional)" rows="3"></textarea>
        <div class="modal-actions">
          <button id="btn-cancel-grade">Cancelar</button>
          <button id="btn-save-grade">Guardar</button>
        </div>
        <p id="grade-error" class="error"></p>
      </div>
    </div>
  </main>

  <script type="module">
    import { getProfile, logout } from '../js/auth.js'
    import { getAssignment, getSubmissions, gradeSubmission } from '../js/teacher/assignment.js'

    const params = new URLSearchParams(window.location.search)
    const assignmentId = params.get('id')
    if (!assignmentId) window.location.href = 'dashboard.html'

    const profile = await getProfile()
    if (!profile || profile.role !== 'teacher') window.location.href = '../index.html'

    document.getElementById('user-name').textContent = profile.full_name
    document.getElementById('btn-logout').addEventListener('click', logout)

    // Cargar tarea
    const assignment = await getAssignment(assignmentId)
    document.getElementById('assignment-title').textContent = assignment.title
    document.getElementById('assignment-desc').textContent = assignment.description || 'Sin descripción'
    document.getElementById('assignment-due').textContent = assignment.due_date
      ? new Date(assignment.due_date).toLocaleString()
      : 'Sin fecha'

    // Cargar entregas
    let currentSubmissionId = null

    async function loadSubmissions() {
      const submissions = await getSubmissions(assignmentId)
      const list = document.getElementById('submissions-list')
      list.innerHTML = ''
      if (!submissions.length) {
        list.innerHTML = '<p class="empty">Ningún estudiante ha entregado aún.</p>'
        return
      }
      submissions.forEach(s => {
        const item = document.createElement('div')
        item.className = 'submission-item'
        item.innerHTML = `
          <div>
            <p class="student-name">${s.profiles.full_name}</p>
            <p class="submitted-at">Entregado: ${new Date(s.submitted_at).toLocaleString()}</p>
            ${s.file_url ? `<a href="${s.file_url}" target="_blank" class="file-link">Ver archivo</a>` : '<span class="no-file">Sin archivo</span>'}
          </div>
          <div class="grade-info">
            ${s.grade !== null ? `<span class="grade">${s.grade}/10</span>` : '<span class="no-grade">Sin calificar</span>'}
            <button class="btn-grade" data-id="${s.id}">Calificar</button>
          </div>
        `
        list.appendChild(item)
      })

      document.querySelectorAll('.btn-grade').forEach(btn => {
        btn.addEventListener('click', () => {
          currentSubmissionId = btn.dataset.id
          document.getElementById('grade-value').value = ''
          document.getElementById('grade-feedback').value = ''
          document.getElementById('grade-error').textContent = ''
          document.getElementById('modal-grade').classList.remove('hidden')
        })
      })
    }

    loadSubmissions()

    // Modal calificar
    document.getElementById('btn-cancel-grade').addEventListener('click', () => {
      document.getElementById('modal-grade').classList.add('hidden')
    })

    document.getElementById('btn-save-grade').addEventListener('click', async () => {
      const grade = parseFloat(document.getElementById('grade-value').value)
      const feedback = document.getElementById('grade-feedback').value.trim()
      if (isNaN(grade) || grade < 0 || grade > 10)
        return document.getElementById('grade-error').textContent = 'Nota debe ser entre 0 y 10'
      const { error } = await gradeSubmission(currentSubmissionId, grade, feedback)
      if (error) return document.getElementById('grade-error').textContent = error.message
      document.getElementById('modal-grade').classList.add('hidden')
      loadSubmissions()
    })
  </script>
</body>
</html>
