<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradex | Profesor</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/teacher.css">
</head>
<body>
  <header>
    <h1>Gradex</h1>
    <div class="header-right">
      <span id="user-name"></span>
      <button id="btn-logout">Cerrar sesión</button>
    </div>
  </header>

  <main>
    <div class="section-header">
      <h2>Mis cursos</h2>
      <button id="btn-new-course">+ Nuevo curso</button>
    </div>

    <div id="courses-grid" class="courses-grid"></div>
  </main>

  <!-- Modal nuevo curso -->
  <div id="modal-course" class="modal hidden">
    <div class="modal-box">
      <h3>Crear curso</h3>
      <input type="text" id="course-name" placeholder="Nombre del curso">
      <p class="hint">El código se genera automáticamente</p>
      <div class="modal-actions">
        <button id="btn-cancel">Cancelar</button>
        <button id="btn-create">Crear</button>
      </div>
      <p id="course-error" class="error"></p>
    </div>
  </div>

  <script type="module">
    import { getProfile, logout } from '../js/auth.js'
    import { getCourses, createCourse } from '../js/teacher/dashboard.js'

    const profile = await getProfile()
    if (!profile || profile.role !== 'teacher') window.location.href = '../index.html'

    document.getElementById('user-name').textContent = profile.full_name
    document.getElementById('btn-logout').addEventListener('click', logout)

    // Cargar cursos
    async function loadCourses() {
      const courses = await getCourses(profile.id)
      const grid = document.getElementById('courses-grid')
      grid.innerHTML = ''
      if (!courses.length) {
        grid.innerHTML = '<p class="empty">No tienes cursos aún.</p>'
        return
      }
      courses.forEach(c => {
        const card = document.createElement('div')
        card.className = 'course-card'
        card.innerHTML = `
          <h3>${c.name}</h3>
          <p class="code">Código: <strong>${c.code}</strong></p>
          <button onclick="window.location.href='course.html?id=${c.id}'">Ver curso</button>
        `
        grid.appendChild(card)
      })
    }

    loadCourses()

    // Modal
    const modal = document.getElementById('modal-course')
    document.getElementById('btn-new-course').addEventListener('click', () => modal.classList.remove('hidden'))
    document.getElementById('btn-cancel').addEventListener('click', () => modal.classList.add('hidden'))

    document.getElementById('btn-create').addEventListener('click', async () => {
      const name = document.getElementById('course-name').value.trim()
      if (!name) return document.getElementById('course-error').textContent = 'Escribe un nombre'
      const { error } = await createCourse(name, profile.id)
      if (error) return document.getElementById('course-error').textContent = error.message
      modal.classList.add('hidden')
      document.getElementById('course-name').value = ''
      loadCourses()
    })
  </script>
</body>
</html>
