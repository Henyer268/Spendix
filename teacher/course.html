<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradex | Curso</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/teacher.css">
</head>
<body>
  <header>
    <h1>Gradex</h1>
    <div class="header-right">
      <span id="user-name"></span>
      <button id="btn-logout">Cerrar sesión</button>
    </div>
  </header>

  <main>
    <a class="back" href="dashboard.html">← Mis cursos</a>

    <div class="section-header">
      <div>
        <h2 id="course-name"></h2>
        <p class="code">Código de acceso: <strong id="course-code"></strong></p>
      </div>
      <button id="btn-new-assignment">+ Nueva tarea</button>
    </div>

    <div id="assignments-list" class="assignments-list"></div>
  </main>

  <!-- Modal nueva tarea -->
  <div id="modal-assignment" class="modal hidden">
    <div class="modal-box">
      <h3>Crear tarea</h3>
      <input type="text" id="assignment-title" placeholder="Título">
      <textarea id="assignment-desc" placeholder="Descripción" rows="3"></textarea>
      <label>Fecha de entrega</label>
      <input type="datetime-local" id="assignment-due">
      <div class="modal-actions">
        <button id="btn-cancel">Cancelar</button>
        <button id="btn-create">Crear</button>
      </div>
      <p id="assignment-error" class="error"></p>
    </div>
  </div>

  <script type="module">
    import { getProfile, logout } from '../js/auth.js'
    import { getCourse, getAssignments, createAssignment } from '../js/teacher/course.js'

    const params = new URLSearchParams(window.location.search)
    const courseId = params.get('id')
    if (!courseId) window.location.href = 'dashboard.html'

    const profile = await getProfile()
    if (!profile || profile.role !== 'teacher') window.location.href = '../index.html'

    document.getElementById('user-name').textContent = profile.full_name
    document.getElementById('btn-logout').addEventListener('click', logout)

    // Cargar curso
    const course = await getCourse(courseId)
    document.getElementById('course-name').textContent = course.name
    document.getElementById('course-code').textContent = course.code

    // Cargar tareas
    async function loadAssignments() {
      const assignments = await getAssignments(courseId)
      const list = document.getElementById('assignments-list')
      list.innerHTML = ''
      if (!assignments.length) {
        list.innerHTML = '<p class="empty">No hay tareas aún.</p>'
        return
      }
      assignments.forEach(a => {
        const item = document.createElement('div')
        item.className = 'assignment-item'
        item.innerHTML = `
          <div>
            <h4>${a.title}</h4>
            <p class="due">Entrega: ${a.due_date ? new Date(a.due_date).toLocaleString() : 'Sin fecha'}</p>
          </div>
          <button onclick="window.location.href='assignment.html?id=${a.id}'">Ver</button>
        `
        list.appendChild(item)
      })
    }

    loadAssignments()

    // Modal
    const modal = document.getElementById('modal-assignment')
    document.getElementById('btn-new-assignment').addEventListener('click', () => modal.classList.remove('hidden'))
    document.getElementById('btn-cancel').addEventListener('click', () => modal.classList.add('hidden'))

    document.getElementById('btn-create').addEventListener('click', async () => {
      const title = document.getElementById('assignment-title').value.trim()
      const description = document.getElementById('assignment-desc').value.trim()
      const due_date = document.getElementById('assignment-due').value
      if (!title) return document.getElementById('assignment-error').textContent = 'Escribe un título'
      const { error } = await createAssignment(courseId, title, description, due_date)
      if (error) return document.getElementById('assignment-error').textContent = error.message
      modal.classList.add('hidden')
      document.getElementById('assignment-title').value = ''
      document.getElementById('assignment-desc').value = ''
      document.getElementById('assignment-due').value = ''
      loadAssignments()
    })
  </script>
</body>
</html>
