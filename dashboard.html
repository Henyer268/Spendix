<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spendix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #c8f060;
      --accent-dim: #7ab030;
      --bg: #0d0d0f;
      --bg2: #111114;
      --bg3: #161618;
      --bg4: #1a1a20;
      --border: #1e1e26;
      --border2: #2a2a32;
      --text: #e8e6e0;
      --text2: #888898;
      --text3: #44444e;
      --red: #e06060;
      --green: #8fc840;
      --red-bg: #2e1010;
      --green-bg: #1a2e10;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 64px;
      background: var(--bg2);
      border-right: 0.5px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
      gap: 8px;
      z-index: 100;
    }

    .logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      cursor: default;
      text-decoration: none;
    }

    .logo span {
      font-size: 16px; font-weight: 700;
      color: var(--bg); letter-spacing: -1px;
    }

    .nav-item {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text3);
      font-size: 18px;
      cursor: pointer;
      transition: all 0.15s;
      border: none; background: none;
      text-decoration: none;
    }

    .nav-item:hover { background: var(--bg4); color: var(--text2); }
    .nav-item.active { background: #1e1e26; color: var(--accent); }

    /* MAIN */
    .main {
      margin-left: 64px;
      padding: 28px 28px 80px 32px;
      width: 100%;
      min-height: 100vh;
    }

    /* TOPBAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .greeting { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
    .greeting-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

    .period-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg3);
      border: 0.5px solid var(--border2);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--text2);
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      transition: border-color 0.15s;
    }

    .period-btn:hover { border-color: var(--accent); color: var(--text); }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #1e2a0e;
      border: 1.5px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600;
      color: var(--accent);
    }

    /* CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .card {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }

    .card.accent {
      background: var(--accent);
      border-color: var(--accent);
    }

    .card-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 10px;
    }

    .card.accent .card-label { color: #5a6a20; }

    .card-value {
      font-family: 'DM Mono', monospace;
      font-size: 26px;
      font-weight: 400;
      letter-spacing: -1px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card.accent .card-value { color: var(--bg); }

    .card-value span { font-size: 14px; }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      margin-top: 4px;
    }

    .badge-up { background: var(--green-bg); color: var(--green); }
    .badge-down { background: var(--red-bg); color: var(--red); }

    /* BOTTOM GRID */
    .bottom {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 14px;
    }

    .panel {
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 18px;
      letter-spacing: 0.3px;
    }

    /* BARS */
    .bar-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 13px;
    }

    .bar-label { font-size: 12px; color: var(--text2); width: 72px; flex-shrink: 0; }

    .bar-track {
      flex: 1; height: 6px;
      background: var(--bg4);
      border-radius: 3px; overflow: hidden;
    }

    .bar-fill {
      height: 100%; border-radius: 3px;
      background: var(--accent);
      transition: width 0.7s cubic-bezier(.4,0,.2,1);
      width: 0;
    }

    .bar-fill.mid { background: var(--accent-dim); }
    .bar-fill.dim { background: #2e2e3a; }
    .bar-amt { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2); width: 60px; text-align: right; }

    /* CHART */
    .chart-area {
      position: relative; height: 90px;
      margin-bottom: 8px;
    }

    .chart-bars {
      display: flex; align-items: flex-end;
      height: 100%; gap: 6px;
    }

    .cbar {
      flex: 1; border-radius: 4px 4px 0 0;
      background: #1e1e26;
      cursor: pointer; transition: background 0.2s;
    }

    .cbar.active { background: var(--accent); }
    .cbar:hover:not(.active) { background: #2a2a36; }

    .months {
      display: flex; gap: 6px; margin-top: 6px;
    }

    .month-lbl {
      flex: 1; text-align: center;
      font-size: 10px; color: var(--text3);
      letter-spacing: 0.3px;
    }

    .month-lbl.active { color: var(--accent); }

    /* TRANSACTIONS */
    .tx-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0;
      border-bottom: 0.5px solid #18181e;
    }

    .tx-item:last-child { border-bottom: none; }

    .tx-icon {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: var(--bg4);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: var(--text2); flex-shrink: 0;
    }

    .tx-name { font-size: 13px; font-weight: 500; color: #c8c6c0; margin-bottom: 2px; }
    .tx-date { font-size: 11px; color: var(--text3); }
    .tx-amt { font-family: 'DM Mono', monospace; font-size: 13px; }
    .tx-out { color: var(--red); }
    .tx-in { color: var(--green); }

    .ver-mas {
      margin-top: 14px; text-align: center;
      font-size: 12px; color: var(--text3);
      cursor: pointer; letter-spacing: 0.5px;
      transition: color 0.15s;
    }

    .ver-mas:hover { color: var(--accent); }

    /* FAB */
    .fab {
      position: fixed; right: 32px; bottom: 32px;
      width: 48px; height: 48px;
      background: var(--accent);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: var(--bg);
      cursor: pointer; border: none;
      transition: transform 0.15s;
      z-index: 200;
    }

    .fab:hover { transform: scale(1.06); }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center;
      z-index: 300;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg2);
      border: 0.5px solid var(--border2);
      border-radius: 18px;
      padding: 28px;
      width: 360px;
      animation: slideUp 0.2s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-title {
      font-size: 16px; font-weight: 600;
      margin-bottom: 20px; letter-spacing: -0.3px;
    }

    .tipo-toggle {
      display: flex; gap: 8px; margin-bottom: 18px;
    }

    .tipo-btn {
      flex: 1; padding: 8px;
      border-radius: 8px;
      border: 0.5px solid var(--border2);
      background: transparent;
      color: var(--text2);
      font-family: 'Syne', sans-serif;
      font-size: 13px; cursor: pointer;
      transition: all 0.15s;
    }

    .tipo-btn.active-gasto {
      background: var(--red-bg);
      border-color: var(--red);
      color: var(--red);
    }

    .tipo-btn.active-ingreso {
      background: var(--green-bg);
      border-color: var(--green);
      color: var(--green);
    }

    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      font-size: 11px; font-weight: 500;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--text3); margin-bottom: 6px;
    }

    .field input, .field select {
      width: 100%;
      background: var(--bg3);
      border: 0.5px solid var(--border2);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus, .field select:focus { border-color: var(--accent); }

    .field select option { background: var(--bg3); }

    .modal-actions {
      display: flex; gap: 10px; margin-top: 20px;
    }

    .btn-cancel {
      flex: 1; padding: 10px;
      background: transparent;
      border: 0.5px solid var(--border2);
      border-radius: 8px;
      color: var(--text2);
      font-family: 'Syne', sans-serif;
      font-size: 13px; cursor: pointer;
      transition: all 0.15s;
    }

    .btn-cancel:hover { border-color: var(--text2); color: var(--text); }

    .btn-save {
      flex: 2; padding: 10px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: var(--bg);
      font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-save:hover { opacity: 0.88; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    .loading { color: var(--text3); font-size: 12px; text-align: center; padding: 20px 0; }

    .empty { color: var(--text3); font-size: 12px; text-align: center; padding: 16px 0; }

    .bottom-nav {
  display: none;
  position: fixed;
  left: 0; right: 0; bottom: 0;
  height: 64px;
  background: var(--bg2);
  border-top: 0.5px solid var(--border);
  z-index: 100;
  align-items: center;
  justify-content: space-around;
  padding: 0 8px;
}
.bnav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  color: var(--text3);
  font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase;
  cursor: pointer; border: none; background: none;
  padding: 8px 14px; border-radius: 10px;
  transition: all 0.15s; text-decoration: none;
}
.bnav-item i { font-size: 20px; }
.bnav-item.active { color: var(--accent); }
@media (max-width: 640px) {
  body { display: block; }
  .sidebar { display: none; }
  .bottom-nav { display: flex; }
  .main { margin-left: 0; padding: 20px 16px 88px 16px; }
  .cards { grid-template-columns: 1fr; }
  .bottom { grid-template-columns: 1fr; }
  .fab { right: 16px; bottom: 76px; }
}

.toast {
  position: fixed;
  bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg4);
  border: 0.5px solid var(--border2);
  border-radius: 10px;
  padding: 10px 18px;
  font-size: 13px; color: var(--text);
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 500; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }


    /* TOOLTIP PERSONALIZADO */
    .nav-item { position: relative; }
    .nav-item::after {
      content: attr(data-tooltip);
      position: absolute;
      left: calc(100% + 10px);
      top: 50%; transform: translateY(-50%);
      background: var(--bg4);
      border: 0.5px solid var(--border2);
      color: var(--text);
      font-size: 12px;
      font-family: 'Syne', sans-serif;
      padding: 5px 10px;
      border-radius: 7px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 999;
    }
    .nav-item:hover::after { opacity: 1; }

</style>
</head>

<script>
  const SUPABASE_URL = 'https://lxdtqbxrksjtflbfyeya.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4ZHRxYnhya3NqdGZsYmZ5ZXlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNDg0NDIsImV4cCI6MjA5NTYyNDQ0Mn0.sU6RW6jsZYKgpWbqQX-YY_hYbpzg0od1FT6iMAPfuMs';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  /* ── AUTH GUARD ── */
  let currentUser = null;
  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'index.html'; return; }
    currentUser = session.user;
    const name = currentUser.user_metadata?.full_name || currentUser.email || '';
    const initials = name.split(' ').filter(Boolean).slice(0,2).map(w => w[0].toUpperCase()).join('') || '??';
    document.querySelectorAll('.avatar').forEach(el => el.textContent = initials);
  })();

  async function logout() {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  }

  const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const MESES_CORTO = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  const CAT_ICONS = { Comida:'ti-shopping-cart', Transporte:'ti-bus', Servicios:'ti-wifi', Ocio:'ti-device-gamepad-2', Otros:'ti-dots' };

  const now = new Date();
  let tipoActual = 'gasto';

  function fmt(n) {
    return '$' + Number(n).toLocaleString('es-CO', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtFecha(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    const hoy = new Date(); hoy.setHours(0,0,0,0);
    const ayer = new Date(hoy); ayer.setDate(ayer.getDate()-1);
    const fd = new Date(dateStr + 'T12:00:00'); fd.setHours(0,0,0,0);
    if (fd.getTime() === hoy.getTime()) return 'Hoy';
    if (fd.getTime() === ayer.getTime()) return 'Ayer';
    return d.getDate() + ' ' + MESES_CORTO[d.getMonth()].toLowerCase();
  }

  // Saludo
  document.getElementById('greeting-mes').textContent = 'Tu resumen, ' + MESES[now.getMonth()].toLowerCase();
  document.getElementById('greeting-sub').textContent = now.getDate() + ' días registrados este mes';
  document.getElementById('mes-label').textContent = MESES[now.getMonth()] + ' ' + now.getFullYear();

  // Fecha default modal
  document.getElementById('inp-fecha').value = now.toISOString().split('T')[0];
let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }
  async function cargarDatos() {
    const inicio = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
    const fin = new Date(now.getFullYear(), now.getMonth()+1, 0).toISOString().split('T')[0];

    const { data } = await sb.from('movimientos').select('*').gte('fecha', inicio).lte('fecha', fin).order('fecha', { ascending: false });
    if (!data) return;

    const ingresos = data.filter(m => m.tipo === 'ingreso').reduce((a,m) => a + parseFloat(m.monto), 0);
    const gastos = data.filter(m => m.tipo === 'gasto').reduce((a,m) => a + parseFloat(m.monto), 0);
    const saldo = ingresos - gastos;

    document.getElementById('saldo').textContent = fmt(saldo);
    document.getElementById('total-ingresos').textContent = fmt(ingresos);
    document.getElementById('total-gastos').textContent = fmt(gastos);

    // Barras categorías
    const cats = {};
    data.filter(m => m.tipo === 'gasto').forEach(m => {
      cats[m.categoria] = (cats[m.categoria] || 0) + parseFloat(m.monto);
    });

    const maxCat = Math.max(...Object.values(cats), 1);
    const catOrden = Object.entries(cats).sort((a,b) => b[1]-a[1]);
    const barsHTML = catOrden.length === 0
      ? '<div class="empty">Sin gastos registrados este mes</div>'
      : catOrden.map(([cat, amt], i) => {
          const pct = Math.round((amt / maxCat) * 100);
          const cls = i === 0 ? '' : i === 1 ? 'mid' : 'dim';
          return `<div class="bar-row">
            <div class="bar-label">${cat}</div>
            <div class="bar-track"><div class="bar-fill ${cls}" data-w="${pct}"></div></div>
            <div class="bar-amt">${fmt(amt)}</div>
          </div>`;
        }).join('');

    document.getElementById('categorias-bars').innerHTML = barsHTML;
    setTimeout(() => {
      document.querySelectorAll('.bar-fill[data-w]').forEach(el => {
        el.style.width = el.dataset.w + '%';
      });
    }, 50);

    // Últimos movimientos
    const ultimos = data.slice(0, 6);
    const txHTML = ultimos.length === 0
      ? '<div class="empty">Sin movimientos este mes</div>'
      : ultimos.map(m => {
          const icon = CAT_ICONS[m.categoria] || 'ti-circle';
          const cls = m.tipo === 'gasto' ? 'tx-out' : 'tx-in';
          const signo = m.tipo === 'gasto' ? '-' : '+';
          return `<div class="tx-item">
            <div class="tx-icon"><i class="ti ${icon}"></i></div>
            <div style="flex:1">
              <div class="tx-name">${m.descripcion || m.categoria}</div>
              <div class="tx-date">${fmtFecha(m.fecha)}</div>
            </div>
            <div class="tx-amt ${cls}">${signo}${fmt(m.monto)}</div>
          </div>`;
        }).join('');

    document.getElementById('tx-list').innerHTML = txHTML;
    if (data.length > 6) document.getElementById('ver-mas').style.display = 'block';

    cargarHistorial();
  }

  async function cargarHistorial() {
    const meses = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      meses.push({ year: d.getFullYear(), month: d.getMonth() });
    }

    const inicio = new Date(meses[0].year, meses[0].month, 1).toISOString().split('T')[0];
    const { data } = await sb.from('movimientos').select('monto,tipo,fecha').gte('fecha', inicio);
    if (!data) return;

    const totales = meses.map(m => {
      const gastos = data.filter(r => {
        const d = new Date(r.fecha + 'T12:00:00');
        return r.tipo === 'gasto' && d.getFullYear() === m.year && d.getMonth() === m.month;
      }).reduce((a,r) => a + parseFloat(r.monto), 0);
      return gastos;
    });

    const maxT = Math.max(...totales, 1);

    document.getElementById('chart-bars').innerHTML = meses.map((m, i) => {
      const h = Math.max(Math.round((totales[i] / maxT) * 100), 4);
      const active = i === 5 ? 'active' : '';
      return `<div class="cbar ${active}" style="height:${h}%"></div>`;
    }).join('');

    document.getElementById('chart-months').innerHTML = meses.map((m, i) => {
      const active = i === 5 ? 'active' : '';
      return `<div class="month-lbl ${active}">${MESES_CORTO[m.month]}</div>`;
    }).join('');
  }

  // Modal
  document.getElementById('fab-btn').onclick = () => {
    document.getElementById('modal-overlay').classList.add('open');
  };

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.getElementById('inp-monto').value = '';
    document.getElementById('inp-desc').value = '';
    document.getElementById('inp-fecha').value = now.toISOString().split('T')[0];
    setTipo('gasto');
  }

  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  function setTipo(t) {
    tipoActual = t;
    const bg = document.getElementById('btn-gasto');
    const bi = document.getElementById('btn-ingreso');
    bg.className = 'tipo-btn' + (t === 'gasto' ? ' active-gasto' : '');
    bi.className = 'tipo-btn' + (t === 'ingreso' ? ' active-ingreso' : '');
    const cat = document.getElementById('inp-categoria');
    if (t === 'ingreso') {
      cat.innerHTML = '<option value="Salario">Salario</option><option value="Freelance">Freelance</option><option value="Otros">Otros</option>';
    } else {
      cat.innerHTML = '<option value="Comida">Comida</option><option value="Transporte">Transporte</option><option value="Servicios">Servicios</option><option value="Ocio">Ocio</option><option value="Otros">Otros</option>';
    }
  }

  async function guardar() {
    const monto = parseFloat(document.getElementById('inp-monto').value);
    if (!monto || monto <= 0) { showToast('Ingresa un monto válido'); return; }
    const categoria = document.getElementById('inp-categoria').value;
    const descripcion = document.getElementById('inp-desc').value.trim();
    const fecha = document.getElementById('inp-fecha').value;
    const btn = document.getElementById('btn-save');
    btn.disabled = true; btn.textContent = 'Guardando...';

    const { error } = await sb.from('movimientos').insert([{ tipo: tipoActual, monto, categoria, descripcion: descripcion || null, fecha, user_id: currentUser.id }]);

    btn.disabled = false; btn.textContent = 'Guardar';
    if (error) { showToast('Error: ' + error.message); return; }
    closeModal();
    showToast('Movimiento guardado ✓');
    cargarDatos();
  }

  cargarDatos();
</script>

<div class="toast" id="toast"></div>

</body>
</html>
